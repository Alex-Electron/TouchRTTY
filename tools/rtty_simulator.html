<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTTY Advanced Test Bench</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f4f4f9;}
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        input[type="number"], select { font-size: 16px; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;}
        .checkbox-group { display: flex; align-items: center; margin-bottom: 10px; font-size: 16px; }
        .checkbox-group input { width: auto; margin-right: 10px; transform: scale(1.5); }
        textarea { width: 100%; height: 100px; font-size: 18px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; text-transform: uppercase;}
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { font-size: 18px; padding: 15px; width: 100%; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;}
        .btn-start { background-color: #28a745; }
        .btn-start:active { background-color: #218838; }
        .btn-stop { background-color: #dc3545; }
        .btn-stop:active { background-color: #c82333; }
        .status { text-align: center; margin-top: 15px; font-weight: bold; color: #555; }
        .freq-row { display: flex; gap: 10px; align-items: end; }
        .freq-row > div { flex: 1; }
        .freq-computed { font-size: 13px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>RTTY Test Bench</h2>

    <label>Baud Rate:</label>
    <select id="baud">
        <option value="45.45" selected>45.45 Baud (Amateur Radio)</option>
        <option value="50">50 Baud (Commercial/Weather)</option>
        <option value="75">75 Baud</option>
        <option value="100">100 Baud (NAVTEX/SITOR)</option>
    </select>

    <label>Stop Bits:</label>
    <select id="stopBits">
        <option value="1.0">1.0 (Fastest / Target)</option>
        <option value="1.5" selected>1.5 (Standard ITA2)</option>
        <option value="2.0">2.0 (Slow / Stable)</option>
    </select>

    <label>Shift:</label>
    <select id="shift" onchange="updateFreqs()">
        <option value="85">85 Hz</option>
        <option value="170" selected>170 Hz (Amateur)</option>
        <option value="200">200 Hz</option>
        <option value="340">340 Hz</option>
        <option value="425">425 Hz</option>
        <option value="450">450 Hz (Commercial)</option>
        <option value="500">500 Hz</option>
        <option value="850">850 Hz (Military)</option>
        <option value="custom">Custom...</option>
    </select>

    <label>Input mode:</label>
    <select id="freqMode" onchange="updateFreqs()">
        <option value="center" selected>Center frequency</option>
        <option value="mark">Mark frequency (direct)</option>
    </select>

    <label id="freqLabel">Center Frequency (Hz):</label>
    <input type="number" id="freqInput" value="1500" onchange="updateFreqs()">

    <div class="freq-computed" id="freqDisplay">Mark: 1415 Hz &nbsp;|&nbsp; Space: 1585 Hz</div>

    <div class="checkbox-group">
        <input type="checkbox" id="invertTones">
        <label for="invertTones" style="margin-top: 0;">Invert Tones (Swap Mark/Space)</label>
    </div>

    <label>Text to Transmit (Loops infinitely):</label>
    <textarea id="textInput">RYRYRY THE QUICK BROWN FOX JUMPS OVER 1234567890 </textarea>

    <div class="btn-group">
        <button class="btn-start" onclick="startRTTY()">START</button>
        <button class="btn-stop" onclick="stopRTTY()">STOP</button>
    </div>

    <div class="status" id="statusText">Status: IDLE</div>

    <script>
        // Standard ITA2 Baudot lookup tables
        const LETTERS = "\0E\nA SIU\rDRJNFCKTZLWHYPQOBG\0MXV\0";
        const FIGURES = "\x003\n- \u000787\r$4',!:(5\")2#6019?&\x00./=\x00";
        const SHIFT_LETTERS = 0x1F;
        const SHIFT_FIGURES = 0x1B;

        let audioCtx;
        let osc;
        let gain;
        let isPlaying = false;
        let scheduleTimer;

        function getShiftHz() {
            const shiftSel = document.getElementById('shift');
            return shiftSel.value === 'custom' ? 170 : parseFloat(shiftSel.value);
        }

        function updateFreqs() {
            const mode = document.getElementById('freqMode').value;
            const val = parseFloat(document.getElementById('freqInput').value);
            const shift = getShiftHz();
            let mark, space;
            if (mode === 'mark') {
                mark = val;
                space = val + shift;
                document.getElementById('freqLabel').innerText = 'Mark Frequency (Hz):';
            } else {
                mark = val - shift / 2;
                space = val + shift / 2;
                document.getElementById('freqLabel').innerText = 'Center Frequency (Hz):';
            }
            document.getElementById('freqDisplay').innerHTML =
                'Mark: ' + mark.toFixed(0) + ' Hz &nbsp;|&nbsp; Space: ' + space.toFixed(0) + ' Hz' +
                ' &nbsp;|&nbsp; Center: ' + ((mark + space) / 2).toFixed(0) + ' Hz';
        }
        updateFreqs();

        function getFreqs() {
            const mode = document.getElementById('freqMode').value;
            const val = parseFloat(document.getElementById('freqInput').value);
            const shift = getShiftHz();
            let mark, space;
            if (mode === 'mark') {
                mark = val;
                space = val + shift;
            } else {
                mark = val - shift / 2;
                space = val + shift / 2;
            }
            const invert = document.getElementById('invertTones').checked;
            if (invert) { let tmp = mark; mark = space; space = tmp; }
            return { mark, space };
        }

        function startRTTY() {
            if (isPlaying) return;

            // Re-initialize AudioContext
            if (!audioCtx || audioCtx.state === 'closed') {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            const rawText = document.getElementById('textInput').value.toUpperCase();
            const text = rawText.length > 0 ? rawText : "RYRYRY ";

            const baud = parseFloat(document.getElementById('baud').value);
            const stopBits = parseFloat(document.getElementById('stopBits').value);
            const { mark: freqMark, space: freqSpace } = getFreqs();

            const bitTime = 1.0 / baud;

            osc = audioCtx.createOscillator();
            gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            isPlaying = true;
            document.getElementById('statusText').innerText =
                "TX: " + baud + " Bd, " + stopBits + " stop, M:" +
                freqMark.toFixed(0) + " S:" + freqSpace.toFixed(0);
            document.getElementById('statusText').style.color = "#28a745";

            let time = audioCtx.currentTime;

            // Start with Mark tone (idle state)
            osc.frequency.setValueAtTime(freqMark, time);
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(1, time + 0.05);
            time += 0.5; // Idle tone before transmission

            let currentShift = 'LETTERS';
            let charIndex = 0;

        // Function to schedule a single Baudot character
        function scheduleChar(code) {
            // 1. Start Bit (Space tone) — instantaneous frequency switch
            osc.frequency.setValueAtTime(freqSpace, time);
            time += bitTime;

            // 2. Data Bits (5 bits, LSB first)
            for (let i = 0; i < 5; i++) {
                let bit = (code >> i) & 1;
                osc.frequency.setValueAtTime(bit ? freqMark : freqSpace, time);
                time += bitTime;
            }

            // 3. Stop Bit(s) (Mark tone)
            osc.frequency.setValueAtTime(freqMark, time);
            time += bitTime * stopBits;
        }

            // Look-ahead scheduler function
            function scheduleChunk() {
                if (!isPlaying) return;

                // Schedule audio slightly ahead to ensure seamless playback
                while (time < audioCtx.currentTime + 1.0) {
                    let char = text[charIndex];
                    let code = -1;

                    let lIdx = LETTERS.indexOf(char);
                    if (lIdx !== -1) {
                        // Switch to letters if needed
                        if (currentShift !== 'LETTERS' && char !== ' ' && char !== '\r' && char !== '\n') {
                            scheduleChar(SHIFT_LETTERS);
                            currentShift = 'LETTERS';
                        }
                        code = lIdx;
                    } else {
                        let fIdx = FIGURES.indexOf(char);
                        if (fIdx !== -1) {
                            // Switch to figures if needed
                            if (currentShift !== 'FIGURES' && char !== ' ' && char !== '\r' && char !== '\n') {
                                scheduleChar(SHIFT_FIGURES);
                                currentShift = 'FIGURES';
                            }
                            code = fIdx;
                        }
                    }

                    if (code !== -1) {
                        scheduleChar(code);
                    }

                    // Loop text
                    charIndex = (charIndex + 1) % text.length;
                }

                // Recursive timeout for the next chunk
                scheduleTimer = setTimeout(scheduleChunk, 250);
            }

            scheduleChunk();
        }

        function stopRTTY() {
            if (!isPlaying) return;

            clearTimeout(scheduleTimer);
            isPlaying = false;

            if (gain && osc) {
                let time = audioCtx.currentTime;
                gain.gain.setValueAtTime(1, time);
                // Smooth fade out to prevent clicks
                gain.gain.linearRampToValueAtTime(0, time + 0.05);
                osc.stop(time + 0.1);
            }

            document.getElementById('statusText').innerText = "Status: IDLE";
            document.getElementById('statusText').style.color = "#555";
        }
    </script>

</body>
</html>
